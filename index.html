<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多模态脑影像AI成瘾识别系统 - 功能演示</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
  body{background:#f5f7fa;color:#333;padding:20px}
  .container{max-width:1000px;margin:0 auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 15px rgba(0,0,0,.1)}
  .header{text-align:center;margin-bottom:30px;padding-bottom:15px;border-bottom:2px solid #007bff}
  .header h1{color:#007bff;font-size:2rem;margin-bottom:8px}
  .header p{color:#666;font-size:1.1rem}

  .upload-box{border:2px dashed #007bff;border-radius:10px;padding:40px;text-align:center;margin:20px 0;background:#f8f9fa}
  .upload-box input{display:none}
  .upload-btn{display:inline-block;padding:12px 24px;background:#007bff;color:#fff;border-radius:8px;font-size:1rem;cursor:pointer;margin-bottom:10px}
  .upload-tip{color:#666;font-size:.9rem}

  .result-area{margin-top:30px;display:none}
  .result-area.show{display:block}
  .result-card{border:1px solid #eee;border-radius:10px;padding:20px;margin-top:15px;background:#fff}
  .result-card h3{color:#007bff;margin-bottom:10px}
  .result-card .line{margin:12px 0;padding-left:8px;border-left:3px solid #007bff;color:#444}
  .progress{height:12px;background:#e9ecef;border-radius:6px;overflow:hidden;margin:10px 0}
  .progress-bar{height:100%;background:#007bff;width:0;transition:width .8s}
  .suggest{margin-top:15px;padding:15px;border-radius:8px;background:#e7f5ff;color:#0056b3}

  .nav{margin:25px 0;background:#007bff;border-radius:8px;overflow:hidden}
  .nav ul{list-style:none;display:flex;flex-wrap:wrap}
  .nav li{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.2)}
  .nav li:last-child{border-right:0}
  .nav a{display:block;padding:12px 10px;color:#fff;text-decoration:none;font-size:1rem}
  .nav a:hover{background:#0056b3}

  @media(max-width:768px){.nav ul{flex-direction:column}.nav li{border-right:0;border-bottom:1px solid rgba(255,255,255,.2)}.nav li:last-child{border-bottom:0}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>多模态脑影像AI成瘾识别系统</h1>
    <p>功能演示：上传脑影像 → AI分析 → 识别与预测 → 戒断建议</p>
  </div>

  <div class="nav">
    <ul>
      <li><a href="#upload">上传影像</a></li>
      <li><a href="#analysis">分析结果</a></li>
      <li><a href="#suggest">戒断建议</a></li>
    </ul>
  </div>

  <!-- 上传区 -->
  <div id="upload" class="section">
    <h2>上传脑影像（MRI/CT等）</h2>
    <div class="upload-box">
      <label class="upload-btn" for="file">选择影像文件</label>
      <input id="file" type="file" accept=".jpg,.jpeg,.png,.dcm" />
      <div class="upload-tip">支持：JPG/PNG/DICOM（演示模式，仅前端模拟）</div>
    </div>
    <div id="file-name" style="text-align:center;margin-top:10px;color:#666"></div>
    <button id="analyze-btn" class="upload-btn" style="margin-top:15px;display:none;background:#28a745">开始AI分析</button>
  </div>

  <!-- 分析结果区 -->
  <div id="analysis" class="result-area">
    <div class="result-card">
      <h3>AI分析结果（演示）</h3>

      <div class="line">1. 成瘾类型识别</div>
      <div class="progress">
        <div id="bar-heroin" class="progress-bar" style="width:0"></div>
      </div>
      <div id="text-heroin" class="line">海洛因成瘾概率：--</div>

      <div class="progress">
        <div id="bar-cocaine" class="progress-bar" style="width:0"></div>
      </div>
      <div id="text-cocaine" class="line">可卡因成瘾概率：--</div>

      <div class="line">2. 复吸风险评估</div>
      <div class="progress">
        <div id="bar-relapse" class="progress-bar" style="width:0"></div>
      </div>
      <div id="text-relapse" class="line">复吸风险等级：--</div>

      <div class="line">3. 脑网络/结构异常指标（模拟）</div>
      <ul id="brain-indicators" class="line" style="padding-left:25px"></ul>
    </div>
  </div>

  <!-- 戒断建议区 -->
  <div id="suggest" class="result-area">
    <div class="result-card">
      <h3>戒断与康复建议（模拟）</h3>
      <div id="suggest-text" class="suggest"></div>
    </div>
  </div>
</div>

<script>
// 模拟：选中文件后显示文件名与分析按钮
const fileInput = document.getElementById('file');
const fileName = document.getElementById('file-name');
const analyzeBtn = document.getElementById('analyze-btn');

fileInput.addEventListener('change',()=>{
  if(fileInput.files.length>0){
    fileName.textContent = `已选择：${fileInput.files[0].name}`;
    analyzeBtn.style.display = 'inline-block';
  }
});

// 模拟：点击分析 → 随机生成概率 + 建议
analyzeBtn.addEventListener('click',()=>{
  // 模拟分析中
  analyzeBtn.textContent = '分析中...';
  analyzeBtn.disabled = true;

  setTimeout(()=>{
    // 随机生成演示数据（范围 60%-95%）
    const heroin = Math.floor(Math.random()*35+60);
    const cocaine = Math.floor(Math.random()*35+60);
    const relapse = Math.floor(Math.random()*40+55);

    // 动画进度条
    const barH = document.getElementById('bar-heroin');
    const barC = document.getElementById('bar-cocaine');
    const barR = document.getElementById('bar-relapse');

    barH.style.width = `${heroin}%`;
    barC.style.width = `${cocaine}%`;
    barR.style.width = `${relapse}%`;

    // 写入结果文本
    document.getElementById('text-heroin').textContent = `海洛因成瘾概率：${heroin}%`;
    document.getElementById('text-cocaine').textContent = `可卡因成瘾概率：${cocaine}%`;
    document.getElementById('text-relapse').textContent = `复吸风险等级：${relapse>=80?"高":relapse>=70?"中":"低"}`;

    // 脑指标模拟
    const indicators = document.getElementById('brain-indicators');
    indicators.innerHTML = `
      <li>前额叶灰质体积：降低（与冲动控制相关）</li>
      <li>纹状体-前额叶连接强度：异常增强</li>
      <li>海马体体积：轻度降低（与记忆/情绪调节相关）</li>
    `;

    // 戒断建议模拟（按风险等级）
    const suggestText = document.getElementById('suggest-text');
    let level = "低";
    if(relapse>=80) level="高";
    else if(relapse>=70) level="中";

    if(level==="高"){
      suggestText.innerHTML = `
        <p>⚠️ 复吸风险<strong>高</strong>，建议立即启动强化干预：</p>
        <ul>
          <li>每周1次面对面心理咨询+药物辅助戒断（遵医嘱）</li>
          <li>加强家庭支持系统，避免高风险诱因环境</li>
          <li>定期复查脑影像，动态监控神经环路变化</li>
        </ul>
      `;
    }else if(level==="中"){
      suggestText.innerHTML = `
        <p>⚠️ 复吸风险<strong>中</strong>，建议稳步推进戒断计划：</p>
        <ul>
          <li>每2周1次心理辅导，建立诱因应对策略</li>
          <li>规律作息与运动，改善脑网络可塑性</li>
        </ul>
      `;
    }else{
      suggestText.innerHTML = `
        <p>✅ 复吸风险<strong>低</strong>，保持当前戒断方案：</p>
        <ul>
          <li>每月随访，巩固社会支持与戒断习惯</li>
          <li>持续健康管理，减少复吸触发点</li>
        </ul>
      `;
    }

    // 显示结果区域
    document.getElementById('analysis').classList.add('show');
    document.getElementById('suggest').classList.add('show');
    // 重置按钮
    analyzeBtn.textContent = '重新分析';
    analyzeBtn.disabled = false;
  },1200);
});
</script>
</body>
</html>
